name: make-release

on:
  push:
    branches:
      - dev
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  prebuild:
    name: prebuild (${{ matrix.target }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ABI-tagged prebuilds (prebuildify --no-napi) per Node major.
        # Same NODE_MODULE_VERSION covers all patches within a major.
        include:
          - os: windows-latest
            target: win32-x64
            node: 22
          - os: windows-latest
            target: win32-x64
            node: 24
          - os: windows-latest
            target: win32-x64
            node: 26
          - os: ubuntu-22.04
            target: linux-x64
            node: 22
          - os: ubuntu-22.04
            target: linux-x64
            node: 24
          - os: ubuntu-22.04
            target: linux-x64
            node: 26
          - os: ubuntu-22.04-arm
            target: linux-arm64
            node: 22
          - os: ubuntu-22.04-arm
            target: linux-arm64
            node: 24
          - os: ubuntu-22.04-arm
            target: linux-arm64
            node: 26
          - os: macos-14
            target: darwin-arm64
            node: 22
          - os: macos-14
            target: darwin-arm64
            node: 24
          - os: macos-14
            target: darwin-arm64
            node: 26
          - os: macos-15-intel
            target: darwin-x64
            node: 22
          - os: macos-15-intel
            target: darwin-x64
            node: 24
          - os: macos-15-intel
            target: darwin-x64
            node: 26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prebuild
        run: npm run prebuild

      - name: Smoke load prebuild
        run: npm run smoke:prebuild

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}-node${{ matrix.node }}
          path: prebuilds/
          if-no-files-found: error

  # Alpine / musl: build inside docker so host checkout/upload Actions work on
  # arm64 too (JS Actions are not supported in Alpine containers on ARM runners).
  # https://github.com/JS-AK/watchdog/actions/runs/30015249204/job/89233421889
  prebuild-musl:
    name: prebuild (linux-${{ matrix.arch }}-musl / Node ${{ matrix.node }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x64
            node: 22
          - runner: ubuntu-22.04
            arch: x64
            node: 24
          - runner: ubuntu-22.04
            arch: x64
            node: 26
          - runner: ubuntu-22.04-arm
            arch: arm64
            node: 22
          - runner: ubuntu-22.04-arm
            arch: arm64
            node: 24
          - runner: ubuntu-22.04-arm
            arch: arm64
            node: 26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build musl prebuild in Alpine
        run: |
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            "node:${{ matrix.node }}-alpine" \
            sh -c 'apk add --no-cache python3 make g++ git && npm ci && npm run prebuild && npm run smoke:prebuild'

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-linux-${{ matrix.arch }}-musl-node${{ matrix.node }}
          path: prebuilds/
          if-no-files-found: error

  release:
    name: Release
    needs: [prebuild, prebuild-musl]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Download all prebuilds
        uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          merge-multiple: true
          path: prebuilds

      - name: Show prebuilds layout
        run: find prebuilds -type f | sort

      - name: Install dependencies
        run: npm ci

      - name: Make Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
