name: make-release

on:
  push:
    branches:
      - dev
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  prebuild:
    name: prebuild (${{ matrix.target }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Build against the real runner Node (not -t 24.0.0) so builtWithNode
        # matches typical node:22 / node:24 images and captureStack can stay on.
        include:
          - os: windows-latest
            target: win32-x64
            node: 22
          - os: windows-latest
            target: win32-x64
            node: 24
          - os: ubuntu-22.04
            target: linux-x64
            node: 22
          - os: ubuntu-22.04
            target: linux-x64
            node: 24
          - os: ubuntu-22.04-arm
            target: linux-arm64
            node: 22
          - os: ubuntu-22.04-arm
            target: linux-arm64
            node: 24
          - os: macos-14
            target: darwin-arm64
            node: 22
          - os: macos-14
            target: darwin-arm64
            node: 24
          - os: macos-15-intel
            target: darwin-x64
            node: 22
          - os: macos-15-intel
            target: darwin-x64
            node: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prebuild
        run: npm run prebuild

      - name: Smoke load prebuild
        run: npm run smoke:prebuild

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.target }}-node${{ matrix.node }}
          path: prebuilds/
          if-no-files-found: error

  release:
    name: Release
    needs: prebuild
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Download all prebuilds
        uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          merge-multiple: true
          path: prebuilds

      - name: Show prebuilds layout
        run: find prebuilds -type f | sort

      - name: Install dependencies
        run: npm ci

      - name: Make Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
